<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photography Portfolio - Yitong Wang">
  <title>Photography | Yitong Wang</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="photo.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">Yitong Wang</a>
      <button class="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../index.html#about">About</a></li>
        <li><a href="../index.html#projects">Projects</a></li>
        <li><a href="../index.html#publications">Publications</a></li>
        <li><a href="#" class="active">Photography</a></li>
        <li><a href="../cv_wyt.pdf" target="_blank">CV</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <section class="photo-hero">
    <h1><i class="fas fa-camera"></i> Photography</h1>
    <p>Capturing moments through my lens. A collection of photographs exploring light, shadow, and everyday beauty.</p>
  </section>

  <!-- Gallery (populated by JS) -->
  <main>
    <div class="gallery" id="gallery"></div>
  </main>

  <!-- Modal -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    <button class="modal-nav modal-prev" onclick="prevImage()" aria-label="Previous photo">
      <i class="fas fa-chevron-left"></i>
    </button>
    <img id="modal-image" src="" alt="">
    <button class="modal-nav modal-next" onclick="nextImage()" aria-label="Next photo">
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>

  <!-- Back Link -->
  <a href="../index.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Yitong Wang. All rights reserved.</p>
  </footer>

  <script>
    // Single source of truth for all photos
    const photos = [
      { src: 'photo-01-iceland.jpg',        title: '冰岛冰河湖' },
      { src: 'photo-02-oxford.jpg',          title: '英国牛津' },
      { src: 'photo-03-prague.jpg',          title: '捷克布拉格' },
      { src: 'photo-04-london.jpg',          title: '伦敦' },
      { src: 'photo-05-hongkong.jpg',        title: '香港' },
      { src: 'photo-06-zakynthos.jpg',       title: '希腊扎金索斯' },
      { src: 'photo-07-zakynthos.jpg',       title: '希腊扎金索斯' },
      { src: 'photo-08-edinburgh-sunset.jpg',title: '爱丁堡日落' },
      { src: 'photo-09-edinburgh.jpg',       title: '爱丁堡' },
      { src: 'photo-10-edinburgh-fort.jpg',  title: '爱丁堡炮台' },
    ];

    // Build gallery from data
    const gallery = document.getElementById('gallery');
    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.innerHTML = `
        <img src="${photo.src}" alt="${photo.title}" loading="lazy">
        <div class="overlay"><h3>${photo.title}</h3></div>
      `;
      item.addEventListener('click', () => openModal(i));
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') openModal(i);
      });
      gallery.appendChild(item);
    });

    // Modal logic
    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      const img = document.getElementById('modal-image');
      img.src = photos[index].src;
      img.alt = photos[index].title;
      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % photos.length;
      openModal(currentIndex);
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      openModal(currentIndex);
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!document.getElementById('modal').classList.contains('active')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
    });

    // Click outside to close
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    // Hamburger menu
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');
    hamburger.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', open);
    });
  </script>

</body>
</html>
